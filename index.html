<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Maryam</title>

<style>
:root {
    --bg-color: #ffe082;
    --stripe-1: #ffecb3;
    --stripe-2: #fff9c4;
    --text-color: #000;
    --box-bg: #fff;
    --box-border: #000;
    --accent: #ff4081;
}

body.dark-mode {
    --bg-color: #0d1117;
    --stripe-1: #161b22;
    --stripe-2: #0d1117;
    --text-color: #e6edf3;
    --box-bg: #000;
    --box-border: #fff;
    --accent: #00e676;
}

body {
    margin: 0;
    font-family: 'Verdana', sans-serif;
    background-color: var(--bg-color);
    background-image: repeating-linear-gradient(
        45deg,
        var(--stripe-1) 0,
        var(--stripe-1) 20px,
        var(--stripe-2) 20px,
        var(--stripe-2) 40px
    );
    color: var(--text-color);
    overflow-x: hidden;
    transition: 0.15s;
}

/* OPENER */
#opener-container {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffc1e3;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
    z-index: 999;
    transition: transform 4s ease, opacity 3s;
}

.envelope {
    width: 150px;
    height: 100px;
    background: #fff;
    border: 4px solid #000;
    position: relative;
    box-shadow: 6px 6px 0 #000;
}

.envelope::after {
    content: '';
    position: absolute;
    border-left: 75px solid transparent;
    border-right: 75px solid transparent;
    border-top: 50px solid #000;
}

.envelope-text {
    margin-top: 20px;
    font-weight: bold;
}

/* MAIN */
#main-content {
    display: none;
    opacity: 0;
    transform: scale(0.9);
    transition: 1.2s ease;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* NAME */
.glitch-wrapper {
    font-size: 3rem;
    font-weight: 900;
    font-family: monospace;
    text-shadow: 3px 3px 0 var(--accent);
}

/* BOX */
.speech-bubble {
    background: var(--box-bg);
    border: 3px solid var(--box-border);
    padding: 20px;
    box-shadow: 6px 6px 0 var(--box-border);
}

.desc {
    margin-top: 20px;
    border: 2px dashed var(--box-border);
    padding: 15px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    cursor: pointer;
    border: none;
    border-bottom: 3px solid var(--accent);
    background: transparent;
    font-weight: bold;
}
</style>
</head>

<body>

<audio id="bg-music" loop>
    <source src="Piano.mp3" type="audio/mpeg">
</audio>

<!-- OPENER -->
<div id="opener-container" onclick="openApology()">
    <div class="envelope"></div>
    <div class="envelope-text">For Maryam 💌</div>
</div>

<!-- MAIN -->
<div id="main-content">

    <div class="speech-bubble">
        <h2>Welcome to the SORRY ZONE</h2>
    </div>

    <h1 class="glitch-wrapper" id="name-display">MARYAM</h1>

    <p class="desc">
        No excuses. Just honesty.<br>
        <strong>I messed up.</strong>
    </p>

    <button class="btn" onclick="alert('Coffee date fixed ☕')">
        Read More
    </button>

</div>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&!";
const targetName = "MARYAM";

/* OPEN FUNCTION */
function openApology() {
    const opener = document.getElementById('opener-container');
    const content = document.getElementById('main-content');
    const music = document.getElementById('bg-music');

    // Safe audio play (only after click)
    music.volume = 0.3;
    music.play().catch(() => {});

    opener.style.transform = "scale(4)";
    opener.style.opacity = "0";

    setTimeout(() => {
        opener.style.display = "none";
        content.style.display = "block";

        setTimeout(() => {
            content.style.opacity = "1";
            content.style.transform = "scale(1)";
            startNameScramble();
            startGlitch();
        }, 100);

    }, 3000);
}

/* NAME SCRAMBLE */
function startNameScramble() {
    let iteration = 0;
    const el = document.getElementById("name-display");

    const interval = setInterval(() => {
        el.innerText = targetName
            .split("")
            .map((letter, i) => {
                if (i < iteration) return letter;
                return letters[Math.floor(Math.random() * letters.length)];
            })
            .join("");

        if (iteration >= targetName.length) {
            clearInterval(interval);
        }

        iteration += 0.3;
    }, 50);
}

/* GLITCH EFFECT */
function startGlitch() {
    function glitch() {
        document.body.classList.add("dark-mode");

        setTimeout(() => {
            document.body.classList.remove("dark-mode");
        }, Math.random() * 150 + 50);

        setTimeout(glitch, Math.random() * 4000 + 2000);
    }

    glitch();
}
</script>

</body>
</html>
